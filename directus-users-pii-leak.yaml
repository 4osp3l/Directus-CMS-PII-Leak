id: directus-cms-pii-leak

info:
  name: Directus User PII Leak
  author: 4osp3l
  severity: high
  description: Detects Directus CMS instances that expose sensitive user data via the unauthenticated /users endpoint.
  metadata:
    cvss-score: 7.5

http:
  - method: GET
    path:
      - "{{BaseURL}}"
      - "{{BaseURL}}/users"
      - "{{BaseURL}}/cms/users"
      - "{{BaseURL}}/items/users"

    extractors:
      - type: dsl
        dsl:
          - "''"

      - type: regex
        part: body_2
        regex:
          - '"email"\s*:\s*"[^"]*"'
